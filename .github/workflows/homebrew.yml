name: Update Homebrew Tap

# Triggered when a version tag (e.g. v2.10.0) is pushed to main.
# Generates a Homebrew formula (deps installed from PyPI wheels at install
# time) and pushes it to sg004baa/homebrew-tap so
# `brew install sg004baa/tap/posting` works.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  homebrew:
    runs-on: macos-latest
    steps:
      - name: Clone tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          TAP_DIR="$(brew --repository)/Library/Taps/sg004baa/homebrew-tap"
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/sg004baa/homebrew-tap.git" "$TAP_DIR"
          echo "TAP_DIR=$TAP_DIR" >> "$GITHUB_ENV"

      - name: Generate formula
        id: formula
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          VERSION="${TAG#v}"
          URL="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${TAG}.tar.gz"
          SHA256="$(curl -fsSL "$URL" | shasum -a 256 | cut -d' ' -f1)"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          mkdir -p "$TAP_DIR/Formula"
          cat > "$TAP_DIR/Formula/posting.rb" <<EOF
          class Posting < Formula
            include Language::Python::Virtualenv

            desc "Modern API client that lives in your terminal"
            homepage "https://github.com/${GITHUB_REPOSITORY}"
            url "${URL}"
            sha256 "${SHA256}"
            license "Apache-2.0"

            depends_on "python@3.12"

            def install
              # Install posting from source but let pip pull its dependencies as
              # prebuilt PyPI wheels. Several transitive deps (e.g. the
              # tree-sitter grammars textual[syntax] pins) ship broken sdists
              # that cannot compile, and others (pydantic-core, watchfiles)
              # would otherwise require a full rust/llvm toolchain to build.
              virtualenv_create(libexec, "python3.12")
              system libexec/"bin/pip", "install", buildpath
              bin.install_symlink libexec/"bin/posting"
            end

            test do
              assert_match "TUI for testing HTTP APIs", shell_output("#{bin}/posting --help")
            end
          end
          EOF

      - name: Audit formula
        run: brew audit --strict sg004baa/tap/posting || true

      - name: Commit and push formula
        env:
          VERSION: ${{ steps.formula.outputs.version }}
        run: |
          set -euo pipefail
          cd "$TAP_DIR"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage first so the diff check also catches a brand-new formula
          # file (untracked files are invisible to `git diff`).
          git add Formula/posting.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date; nothing to commit."
            exit 0
          fi

          git commit -m "posting ${VERSION}"
          git push
